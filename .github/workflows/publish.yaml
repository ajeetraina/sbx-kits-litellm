name: Publish Kit

# Auto-publish to Docker Hub when the kit changes on main, and allow manual runs.
on:
  push:
    branches: [main]
    paths:
      - spec.yaml
      - README.md
      - scripts/**
      - .github/workflows/publish.yaml
  workflow_dispatch:
    inputs:
      sbx_release:
        description: "docker/sbx-releases tag to install (must support kit-spec v2)"
        required: true
        default: "v0.33.0"
      tag:
        description: "OCI tag to publish"
        required: false
        default: "latest"

jobs:
  publish-kit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SBX
        env:
          GH_TOKEN: ${{ github.token }}
          # On a push event `inputs` is empty, so fall back to the v2-capable default.
          SBX_RELEASE: ${{ inputs.sbx_release || 'v0.33.0' }}
        run: |
          set -euo pipefail
          gh release download "$SBX_RELEASE" \
            --repo docker/sbx-releases \
            --pattern 'DockerSandboxes-linux-amd64-ubuntu2404.deb' \
            --output /tmp/docker-sandboxes.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/docker-sandboxes.deb
          sbx version

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish kit artifact
        env:
          # push-kit.sh validates (sbx kit validate) before it pushes, so a bad
          # spec fails the job before anything reaches Docker Hub.
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ inputs.tag || 'latest' }}
        run: bash ./scripts/push-kit.sh

      - name: Sync Docker Hub overview page
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sbx-kits-litellm
          readme-filepath: ./README.md
          short-description: "Docker Sandboxes mixin: in-sandbox LiteLLM gateway with multi-provider routing and fallbacks"
